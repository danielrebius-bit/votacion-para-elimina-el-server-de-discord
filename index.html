<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Decisión del servidor</title>

<style>
body{
margin:0;
font-family:system-ui, Arial;
background: radial-gradient(circle at top,#151a2e,#0b0f1a);
color:#e8e8e8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:460px;
background: rgba(20,25,45,0.88);
border:1px solid #26314d;
border-radius:14px;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h2{font-size:16px;margin-bottom:8px;}

.badge{
display:inline-block;
padding:4px 8px;
font-size:11px;
border-radius:8px;
background:#1f2a44;
margin-bottom:10px;
color:#9fb3d1;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #2a3555;
background:#0f1525;
color:white;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.red{background:#e74c3c;color:white;}
.green{background:#2ecc71;color:white;}

#panel{display:none;margin-top:15px;}

.status{margin-top:10px;font-size:13px;color:#b0b0b0;}

.box{
margin-top:10px;
background:#0f1525;
border-radius:10px;
padding:10px;
max-height:120px;
overflow:auto;
font-size:13px;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
display:none;
background:black;
}

.bar{
margin-top:10px;
height:12px;
display:flex;
border-radius:8px;
overflow:hidden;
background:#0f1525;
}

.siBar{background:#e74c3c;width:50%;}
.noBar{background:#2ecc71;width:50%;}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div class="card">

<h2>¿Eliminamos el servidor?</h2>
<div class="badge">Sistema de votación en vivo</div>

<input id="name" placeholder="Nombre de usuario">

<button onclick="enter()">Entrar</button>

<div id="panel">

<h3>Usuario: <span id="user"></span></h3>

<button class="red" onclick="vote('si')">Eliminar servidor</button>
<button class="green" onclick="vote('no')">Mantener servidor</button>

<div class="status" id="msg">Esperando acción...</div>

<div class="status">
Eliminar: <span id="si">0</span> |
Mantener: <span id="no">0</span> |
Total: <span id="total">0</span>
</div>

<div class="bar">
<div id="barSi" class="siBar"></div>
<div id="barNo" class="noBar"></div>
</div>

<div class="status" id="ultima">Sin actividad reciente</div>

<h4>Participantes</h4>
<div class="box">
<ul id="users"></ul>
</div>

<video id="video" controls></video>

</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyA2SgyB_hF3rSGIpVMiNdKk_P-1E6xxGyM",
authDomain: "votacion-server.firebaseapp.com",
databaseURL: "https://votacion-server-default-rtdb.firebaseio.com",
projectId: "votacion-server"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user="";

// 🚫 nombres prohibidos
const badWords=["puta","mierda","idiota","cabron","marico","pendejo"];

// entrar
function enter(){

user=document.getElementById("name").value.trim();

if(!user) return alert("Escribe un nombre");

// filtro insultos
if(badWords.some(w=>user.toLowerCase().includes(w))){
alert("Nombre no permitido");
return;
}

// nombres únicos
db.ref("users").once("value").then(snap=>{
let data=snap.val()||{};
let exists=Object.values(data).some(
u=>u.toLowerCase()===user.toLowerCase()
);

if(exists){
alert("Ese nombre ya está en uso");
return;
}

document.getElementById("user").innerText=user;
document.getElementById("panel").style.display="block";
});
}

// votar
function vote(op){

if(localStorage.getItem("voted")){
alert("Ya votaste en este dispositivo");
return;
}

localStorage.setItem("voted","true");

// guardar votos
db.ref("votes/"+op).transaction(n=> (n||0)+1);

// usuarios
db.ref("users").push(user);

// última acción global
db.ref("ultima").set({
user,
op,
time:Date.now()
});

// UI
let msg=document.getElementById("msg");
let video=document.getElementById("video");

msg.innerText = op==="si"
? "Registro: eliminar servidor"
: "Registro: mantener servidor";

// VIDEO FIX
video.style.display="block";
video.pause();
video.removeAttribute("src");
video.load();

setTimeout(()=>{

video.src = op==="si"
? "ssstik.io_@osdanone_1781160056885.mp4"
: "ssstik.io_@pibbledipple_1778120515212.mp4";

video.load();
video.play().catch(()=>{});

},120);

}

// votos en tiempo real
db.ref("votes").on("value", s=>{
let d=s.val()||{};

let si=d.si||0;
let no=d.no||0;

document.getElementById("si").innerText=si;
document.getElementById("no").innerText=no;

let total=si+no;
document.getElementById("total").innerText=total;

if(total>0){
document.getElementById("barSi").style.width=(si/total*100)+"%";
document.getElementById("barNo").style.width=(no/total*100)+"%";
}
});

// última acción global
db.ref("ultima").on("value", s=>{
let d=s.val();
if(!d) return;

document.getElementById("ultima").innerText=
d.user + " votó: " +
(d.op==="si" ? "Eliminar servidor" : "Mantener servidor");
});

// usuarios + roles
db.ref("users").on("value", s=>{
let d=s.val()||{};
let list=document.getElementById("users");
list.innerHTML="";

Object.values(d).forEach(u=>{

let role="";

if(u.toLowerCase()==="hakari") role=" 👑 Owner";
else if(u.toLowerCase()==="daniel") role=" 🛡️ Owner";
else if(u.toLowerCase()==="añónimus" || u.toLowerCase()==="anonimus") role=" ⭐ Staff";

let li=document.createElement("li");
li.innerText="• "+u+role;
list.appendChild(li);
});
});

</script>

</body>
</html>
